  deploy:
    runs-on: deploy
#    needs: build
    steps:
      - name: Force clean workspace
        run: rm -rf ./* ./.??* || true
      - name: Checkout deployment logic
        uses: actions/checkout@v6
        with:
          clean: true
          sparse-checkout: |
            gsdo/deploy
            gsdo/prepare/jre.sh
            !grad*
            !*.kts
          sparse-checkout-cone-mode: false
      - name: Prepare
        run: |
          bash ./gsdo/prepare/jre.sh
      - name: Deploy
        env: 
          SSH_SVCDEPLOY_HETZNER: ${{ secrets.SSH_SVCDEPLOY_HETZNER }}
