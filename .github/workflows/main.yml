name: main 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  VERSION: 0.0.1
  JAVAVERSION: 26.0.1
  ZULUVERSION: 26.30.11
  SONARVERSION: 8.1.0.6389
  GRADLEVERSION: 9.5.1
  NODEVERSION: 26.3.0
  DISTSERVER: tools.goa.systems
  DISTUSER: svcdeploy
  DISTNAME: reactexample
  SERVERPORT: 8085

jobs:
  build:
    runs-on: build
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: |
          bash ./gsdo/prepare/jdk.sh
          bash ./gsdo/prepare/gradle.sh
          bash ./gsdo/prepare/sonarscanner.sh
          bash ./gsdo/prepare/node.sh
      - name: Run a multi-line script
        run: |
          bash ./gsdo/build/build.sh
      - name: Publish
        env: 
          SSH_SVCDEPLOY_HETZNER: ${{ secrets.SSH_SVCDEPLOY_HETZNER }}
        run: |
          bash ./gsdo/publish/publish.sh
  deploy:
    runs-on: deploy
    needs: build
    steps:
      - name: Force clean workspace
        run: rm -rf ./* ./.??* || true
      - name: Checkout deployment logic
        uses: actions/checkout@v6
        with:
          clean: true
          sparse-checkout: |
            gsdo/deploy
            gsdo/prepare/jre.sh
            !grad*
            !*.kts
          sparse-checkout-cone-mode: false
      - name: Prepare
        run: |
          bash ./gsdo/prepare/jre.sh
      - name: Deploy
        env: 
          SSH_SVCDEPLOY_HETZNER: ${{ secrets.SSH_SVCDEPLOY_HETZNER }}
        run: |
          bash ./gsdo/deploy/download.sh
          bash ./gsdo/deploy/deploy.sh
